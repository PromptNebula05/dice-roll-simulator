# .github/workflows/build.yml
name: Java CI (Gradle)

# When to run
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest    # free GitHub-hosted runner

    steps:
      # 1. Check out your code
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Install Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'    # Eclipse Temurin (free, widely used)
          java-version: '21'

      # 3. Cache Gradle dependencies (speeds up future runs)
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }} 
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Make gradlew executable
      - name: Grant execute permission
        run: chmod +x gradlew

      # 5. Build and test
      - name: Build with Gradle
        run: ./gradlew build

      # 6. Run tests explicitly (optional — 'build' already runs tests)
      - name: Run tests
        run: ./gradlew test
